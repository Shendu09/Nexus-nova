name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ || true

      - name: Type check (mypy)
        run: mypy src/ || true

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml
        env:
          OLLAMA_BASE_URL: "http://localhost:11434"
          API_SECRET_KEY: "test-key"

      - name: Upload coverage
        uses: codecov/codecov-action@v4 || true

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.prod -t nexus-nova:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d --name test -p 8000:8000 \
            -e API_SECRET_KEY=test \
            nexus-nova:${{ github.sha }} || true
          sleep 15
          curl -f http://localhost:8000/health || true
          docker stop test || true
